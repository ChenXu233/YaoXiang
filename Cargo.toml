[package]
name = "yaoxiang"
version = "0.7.3"
edition = "2021"
rust-version = "1.96"
description = "YaoXiang (爻象) Programming Language - A high-performance language with type-as-everything philosophy"
readme = "README.md"
license = "MIT"
authors = ["YaoXiang Team","ChenXu233 <Woyerpa@outlook.com>"]
repository = "https://github.com/ChenXu233/yaoxiang"

[features]
debug = []

[lib]
path = "src/lib.rs"

[[bin]]
name = "yaoxiang"
path = "src/main.rs"
test = false

[dev-dependencies]
criterion = "0.8.1"
quickcheck = "1.1.0"
proptest = "1.11"

[[bench]]
name = "lib"
path = "benches/lib.rs"
harness = false

[[bench]]
name = "formatter"
path = "benches/formatter.rs"
harness = false

[dependencies]
# 日志 - tracing
tracing = "0.1"
tracing-subscriber = "0.3"

# 并发和线程安全
parking_lot = "0.12"
crossbeam = "0.8"
rayon = "1.12"
once_cell = "1.21"
atomic = "0.6"

# 随机数
rand = "0.10.1"

# 数据结构
indexmap = "2.14.0"
hashbrown = "0.17.1"
smallvec = "1.15.1"

# 字符串处理
regex = "1"
unicode-ident = "1.0.24"
urlencoding = "2"

# 文件系统
walkdir = "2"
tempfile = "3.27.0"
notify = "8.2.0"

# 序列化
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.150"
ron = "0.12.1"
toml = "1.1.2"

# 错误处理
anyhow = "1"
thiserror = "2.0.18"

# 命令行解析
clap = { version = "4.6.1", features = ["derive"] }

owo-colors = "4.3.0"

# REPL - 交互式编辑
rustyline = { version = "18.0.0", features = ["with-file-history", "with-dirs"] }

# 异步运行时
tokio = { version = "1.52.3", features = ["full"] }

# LSP - 语言服务器协议
lsp-types = "0.97"
lsp-server = "0.7"

[profile.release]
lto = true
opt-level = 3
strip = true
codegen-units = 1

[profile.dev]
debug = true

[profile.bench]
debug = true

[package.metadata.docs.rs]
default-target = "x86_64-unknown-linux-gnu"

[patch.crates-io]
time = { git = "https://github.com/time-rs/time", tag = "v0.3.47" }