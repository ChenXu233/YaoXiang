repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-fix
        name: cargo fix
        entry: cargo fix --all --allow-dirty
        language: system
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --fix --allow-dirty --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --all --quiet
        language: system
        types: [rust]
        pass_filenames: false
        always_run: false

      - id: cargo-doc
        name: cargo doc
        entry: cargo doc --no-deps
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        pass_filenames: false

      - id: check-commit-msg
        name: check commit message format
        entry: python scripts/check-commit-msg.py
        language: system
        stages: [commit-msg]
        always_run: true
