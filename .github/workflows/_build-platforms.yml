name: Build Platforms (Reusable)

on:
  workflow_call:
    inputs:
      build-profile:
        description: 'Build profile: debug or release'
        type: string
        default: 'release'
      build-features:
        description: 'Cargo features flags'
        type: string
        default: '--all-features'
      artifact-prefix:
        description: 'Prefix for artifact names'
        type: string
        default: 'yaoxiang'
      retention-days:
        description: 'Artifact retention days'
        type: number
        default: 30

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux ───────────────────────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross-compile toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build ${{ inputs.build-features }} --target ${{ matrix.target }} ${{ inputs.build-profile == 'release' && '--release' || '' }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang \
             target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang-${{ matrix.target }}
          retention-days: ${{ inputs.retention-days }}

  # ── macOS ───────────────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build ${{ inputs.build-features }} --target ${{ matrix.target }} ${{ inputs.build-profile == 'release' && '--release' || '' }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang \
             target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang-${{ matrix.target }}
          retention-days: ${{ inputs.retention-days }}

  # ── Windows ─────────────────────────────────────────────────────
  build-windows:
    name: Windows (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-gnu, aarch64-pc-windows-gnullvm]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install mingw (x86_64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64-x86-64-dev \
            mingw-w64-tools \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      - name: Install aarch64 cross-compile toolchain
        if: matrix.target == 'aarch64-pc-windows-gnullvm'
        run: |
          # 下载 LLVM MinGW 预构建工具链（含完整 aarch64 Windows 系统库）
          LLVM_MINGW_VER=20260602
          curl -sL "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VER}/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-22.04-x86_64.tar.xz" \
            -o llvm-mingw.tar.xz
          tar -xf llvm-mingw.tar.xz
          # 解压后的目录名包含版本号，找到它
          LLVM_MINGW_DIR=$(echo llvm-mingw-*/)
          echo "LLVM_MINGW=$(pwd)/${LLVM_MINGW_DIR::-1}" >> $GITHUB_ENV

      - name: Configure linker (aarch64)
        if: matrix.target == 'aarch64-pc-windows-gnullvm'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << TOML
          [target.aarch64-pc-windows-gnullvm]
          linker = "${LLVM_MINGW}/bin/aarch64-w64-mingw32-clang"
          rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "link-arg=--sysroot=${LLVM_MINGW}/aarch64-w64-mingw32"]
          TOML

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build ${{ inputs.build-features }} --target ${{ matrix.target }} ${{ inputs.build-profile == 'release' && '--release' || '' }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang.exe \
             target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/${{ inputs.build-profile }}/yaoxiang-${{ matrix.target }}.exe
          retention-days: ${{ inputs.retention-days }}

  # ── Windows Installer ───────────────────────────────────────────
  build-installer:
    name: Windows Installer
    runs-on: windows-latest
    timeout-minutes: 20
    continue-on-error: true
    if: inputs.build-profile == 'release'
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-installer-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-installer-cargo-

      - name: Build release
        run: cargo build --release ${{ inputs.build-features }}

      - name: Sync setup.iss version from Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Detected version: $VERSION"
          sed -i "s/#define MyAppVersion \".*\"/#define MyAppVersion \"${VERSION}\"/" scripts/setup.iss

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create dist directory
        run: mkdir dist

      - name: Build installer
        run: iscc scripts/setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-windows-installer
          path: dist/YaoXiang-Setup-*.exe
          retention-days: ${{ inputs.retention-days }}
