name: Build Wasm (Reusable)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Artifact name'
        type: string
        default: 'wasm-playground'
      retention-days:
        description: 'Artifact retention days'
        type: number
        default: 7
      z3-version:
        description: 'Z3 version for wasm linking'
        type: string
        default: '4.16.0'
    outputs:
      artifact-name:
        description: 'Name of the uploaded artifact'
        value: ${{ inputs.artifact-name }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build Wasm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Download Z3 wasm
        uses: actions/download-artifact@v4
        with:
          name: z3-wasm-${{ inputs.z3-version }}
          path: .z3/z3-${{ inputs.z3-version }}-wasm
        continue-on-error: true

      - name: Verify Z3 wasm
        run: |
          if [ -f ".z3/z3-${{ inputs.z3-version }}-wasm/lib/libz3.a" ]; then
            echo "Z3 wasm found, linking enabled"
          else
            echo "Z3 wasm not found, Z3 features disabled"
          fi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            wasm-cargo-

      - name: Build Wasm
        run: wasm-pack build --target web --no-default-features

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            pkg/yaoxiang.js
            pkg/yaoxiang_bg.wasm
          retention-days: ${{ inputs.retention-days }}
