name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG not found, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Platforms
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    uses: ./.github/workflows/_build-platforms.yml
    with:
      build-profile: release
      artifact-prefix: yaoxiang
      retention-days: 30

  build-wasm:
    name: Build Wasm
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    uses: ./.github/workflows/_build-wasm.yml
    with:
      artifact-name: yaoxiang-wasm
      retention-days: 30

  security:
    name: Security Audit
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run audit
        run: cargo audit

  test:
    name: Test
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: release-test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-test-${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --all --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --lib --bins

      - name: Doc tests
        run: cargo test --doc --all-features

  release:
    name: Publish Release
    needs: [check-version, build, build-wasm, security, test]
    if: always() && needs.check-version.outputs.should-release == 'true' && !cancelled() && needs.security.result == 'success' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Download all artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: ls -R release-artifacts || echo "No artifacts found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ github.event.head_commit.message }}
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/yaoxiang
            release-artifacts/**/*.wasm
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
