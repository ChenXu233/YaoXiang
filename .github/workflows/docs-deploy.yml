name: Deploy Docs

on:
  push:
    branches: [main, dev]
    paths: ['docs/**', 'src/**', 'Cargo.toml', 'Cargo.lock', '!.obsidian/**', '!.git/**']

jobs:
  build-wasm:
    name: Build Wasm
    uses: ./.github/workflows/_build-wasm.yml
    with:
      artifact-name: wasm-playground-wasm
      retention-days: 7

  build-docs:
    name: Build Docs
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-playground-wasm
          path: wasm-temp

      - name: Unpack wasm
        run: |
          mkdir -p docs/src/.vitepress/public/wasm
          unzip -o wasm-temp/yaoxiang-wasm.zip -d docs/src/.vitepress/public/wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
          standalone: true

      - name: Install Dependencies
        working-directory: docs
        run: pnpm install

      - name: Build Docs
        working-directory: docs
        run: pnpm run docs:build

      - name: Verify Build Output
        working-directory: docs/src
        run: ls -la .vitepress/dist || echo "Build output not found!"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/src/.vitepress/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
