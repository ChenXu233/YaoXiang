name: Nightly

on:
  schedule:
    - cron: '17 22 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross-platform Build
    uses: ./.github/workflows/_build-platforms.yml
    with:
      build-profile: release
      artifact-prefix: yaoxiang-nightly
      retention-days: 14

  build-wasm:
    name: Build Wasm
    uses: ./.github/workflows/_build-wasm.yml
    with:
      artifact-name: yaoxiang-nightly-wasm
      retention-days: 14

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run audit
        run: cargo audit

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: bench-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-${{ runner.os }}-cargo-

      - name: Run benchmarks
        run: cargo bench --all-features 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            target/criterion/
            benchmark-output.txt
          retention-days: 30

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN }}
          components: llvm-tools

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --quiet

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: coverage-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-cargo-

      - name: Generate coverage
        run: cargo llvm-cov --all-features --html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 30

  publish:
    name: Publish Nightly Pre-release
    needs: [build, build-wasm]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete old nightly tag
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -d nightly || true
          git push origin --delete nightly || true

      - name: Create nightly tag
        run: |
          git tag nightly
          git push origin nightly

      - name: Delete old nightly release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes || true

      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Pre-release"
          body: |
            > ⚠️ **这是自动构建的 nightly 版本，仅供测试使用，可能不稳定。**

            Automated nightly build from commit ${{ steps.sha.outputs.short }}
          prerelease: true
          files: |
            release-artifacts/**/yaoxiang-*
            release-artifacts/**/YaoXiang-Setup-*.exe
          fail_on_unmatched_files: false
