name: RFC Check
on:
  pull_request:
    paths:
      - "docs/src/design/rfc/**"
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run RFC validation
        run: python scripts/rfc/check_tracking.py
      - name: Commit TRACKING.md if changed
        run: |
          git config user.name "rfc-bot"
          git config user.email "rfc-bot@yaoxiang.dev"
          git add docs/src/design/rfc/TRACKING.md
          git commit -m "chore: auto-update TRACKING.md [skip ci]" || true
