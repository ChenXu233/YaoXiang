name: Auto Translate Docs

on:
  push:
    paths:
      - 'docs/src/**/*.md'
      - 'docs/vpi18n.config.json'
      - 'docs/glossary.json'
    branches:
      - main
      - dev

jobs:
  translate:
    runs-on: ubuntu-latest
    concurrency:
      group: auto-translate-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install
        working-directory: docs

      - name: Create .env for vpi
        run: |
          cat > .env << EOF
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_MODEL=${{ secrets.AI_MODEL || 'MiniMax-M2.7-highspeed' }}
          AI_BASE_URL=${{ secrets.AI_BASE_URL || 'http://101.132.38.216:3000/v1' }}
          EOF
        working-directory: docs
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}

      - name: Validate secrets
        run: |
          if [ -z "$AI_API_KEY" ]; then
            echo "ERROR: AI_API_KEY secret is required but not set"
            exit 1
          fi
          echo "Secrets validated successfully"
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: Translate documents
        run: npx vpi gen
        working-directory: docs

      - name: Clean up orphaned translations
        run: node scripts/cleanup-translations.mjs
        working-directory: docs

      - name: Commit translations
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/src/en/ docs/src/ja/ docs/src/ru/ docs/src/.i18n-cache.json docs/vpi18n.config.json
          git diff --staged --quiet || git commit -m ":pencil: docs: auto-translate documentation"
          git pull --rebase origin dev
          git push
