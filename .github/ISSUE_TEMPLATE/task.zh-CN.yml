---
name: 任务
description: 创建开发任务或追踪项
labels: ["task"]
assignees: []

body:
  - type: dropdown
    id: task_type
    attributes:
      label: 任务类型
      description: 选择任务类型
      options:
        - 功能实现
        - 调研
        - 文档
        - 测试
        - 重构
        - CI/CD
        - 其他
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 相关组件
      description: 这个任务影响到哪个组件
      options:
        - 词法分析器 (Lexer)
        - 解析器 (Parser)
        - 类型检查器 (Type Checker)
        - 中间表示 (IR)
        - 代码生成 (Codegen)
        - 运行时 (Runtime)
        - 命令行工具 (CLI/Tools)
        - 文档 (Docs)
        - 基础设施 (Infrastructure)
        - 其他 (Other)

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 任务的重要程度
      options:
        - P0 - 紧急
        - P1 - 高
        - P2 - 中
        - P3 - 低
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: 初始状态
      description: 任务的当前状态
      options:
        - todo - 待处理
        - in_progress - 进行中
        - blocked - 阻塞
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 任务描述
      description: 详细描述这个任务的内容和目标
      placeholder: |
        描述这个任务要做什么...

  - type: textarea
    id: deliverables
    attributes:
      label: 交付物
      description: 任务完成后的预期产出
      placeholder: |
        - [ ] 新增功能 X
        - [ ] 修改文件 Y
        - [ ] 添加测试 Z

  - type: input
    id: dependencies
    attributes:
      label: 依赖任务
      description: 此任务依赖的其他 Issue 编号（用逗号分隔）
      placeholder: 例如 #123, #456

  - type: textarea
    id: additional
    attributes:
      label: 额外上下文
      description: 任何其他有助于理解这个任务的信息
