---
name: Task
description: Create a development task or tracking item
labels: ["task"]
assignees: []

body:
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      description: Select the task type
      options:
        - Implementation
        - Research
        - Documentation
        - Testing
        - Refactoring
        - CI/CD
        - Other
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which component does this task affect
      options:
        - Lexer
        - Parser
        - Type Checker
        - IR
        - Codegen
        - Runtime
        - CLI/Tools
        - Docs
        - Infrastructure
        - Other

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this task
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Initial Status
      description: Current status of the task
      options:
        - todo - To Do
        - in_progress - In Progress
        - blocked - Blocked
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the task content and objectives in detail
      placeholder: |
        Describe what this task should accomplish...

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: Expected outputs when the task is complete
      placeholder: |
        - [ ] Add feature X
        - [ ] Modify file Y
        - [ ] Add tests Z

  - type: input
    id: dependencies
    attributes:
      label: Dependencies
      description: Other issue numbers this task depends on (comma separated)
      placeholder: e.g. #123, #456

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that helps understand this task
