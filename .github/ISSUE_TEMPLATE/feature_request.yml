---
name: Feature Request
description: Suggest a new feature for YaoXiang
labels: ["enhancement"]
assignees: []

body:
  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      description: Select the type of feature you're requesting
      options:
        - Language Feature - new syntax, built-in types, etc.
        - Runtime Feature - memory management, concurrency model, etc.
        - CLI/Tools - new commands, tool improvements
        - Documentation
        - Performance
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature
      options:
        - P0 - Critical - must have
        - P1 - High - important feature
        - P2 - Medium - improvement
        - P3 - Low - nice to have
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Describe the problem you want to solve or the limitation you encountered
      placeholder: |
        When using YaoXiang, I encounter...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like the problem to be solved
      placeholder: |
        I'd like to support... syntax/feature

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe other solutions you've considered

  - type: textarea
    id: usage
    attributes:
      label: Usage Example
      description: Provide an example of the API/syntax you'd like to use
      placeholder: |
        ```yaoxiang
        // Desired usage
        ```

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that helps understand this feature request
