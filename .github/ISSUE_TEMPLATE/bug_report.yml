---
name: Bug Report
description: Report a bug in YaoXiang language
labels: ["bug"]
assignees: []

body:
  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      description: Select the compiler/tool component with the issue
      options:
        - Lexer
        - Parser
        - Type Checker
        - IR
        - Codegen
        - Runtime
        - CLI/Tools
        - Docs
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: YaoXiang Version
      description: Run `yaoxiang --version` to get the version
      placeholder: e.g. v0.5.6

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Describe how to reproduce this bug in detail
      placeholder: |
        1. Run command '...'
        2. Input '...'
        3. See error '...'

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened

  - type: textarea
    id: code
    attributes:
      label: Reproducible Code
      description: Provide a minimal code example that causes the bug
      placeholder: |
        ```yaoxiang
        // Paste the problematic code here
        ```

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste the complete error message or panic output

  - type: checkboxes
    id: environment
    attributes:
      label: Environment
      options:
        - label: Linux
        - label: macOS
        - label: Windows
        - label: WSL

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help resolve this issue
